      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="UTF-8">
      <title>K6 Performance Dashboard</title>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f4f6f8; }
      header { background:#2c3e50; color:white; padding:20px; text-align:center; }
      h1 { margin:0; }
      .container { max-width:1200px; margin:auto; padding:20px; }
      .cards { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:40px; }
      .card { background:white; flex:1; min-width:200px; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
      .card h2 { margin-top:0; color:#2980b9; font-size:1.2em; }
      canvas { background:white; padding:10px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-bottom:40px; }
      table { border-collapse: collapse; width:100%; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background-color: #2980b9; color:white; }
      tr:nth-child(even) { background-color:#f2f2f2; }
      .status-2xx { background-color:#2ecc71; color:white; font-weight:bold; }
      .status-4xx { background-color:#f1c40f; color:black; font-weight:bold; }
      .status-5xx { background-color:#e74c3c; color:white; font-weight:bold; }
      </style>
      </head>
      <body>
      <header><h1>K6 Interactive Dashboard</h1></header>
      <div class="container">
        <div class="cards">
          <div class="card"><h2>Total Requests</h2><p id="totalRequests">0</p></div>
          <div class="card"><h2>Failed Requests</h2><p id="failedRequests">0</p></div>
          <div class="card"><h2>Average Duration (ms)</h2><p id="avgDuration">0</p></div>
        </div>

        <label for="urlFilter">Filter by URL:</label>
        <select id="urlFilter"><option value="all">All</option></select>

        <h2>Requests Table</h2>
        <table id="requestsTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Method</th>
              <th>URL</th>
              <th>Status</th>
              <th>Duration (ms)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <h2>Charts</h2>
        <canvas id="durationChart" height="100"></canvas>
        <canvas id="errorsChart" height="100"></canvas>
      </div>

      <script>
      // Parse JSON lines
      let lines = `$(cat $REPORT_JSON)`.split('\n').filter(l => l.trim() !== '');
      let requests = [];
      let urlsSet = new Set();
      let totalDuration = 0, durationCount = 0, failedRequests = 0;

      lines.forEach(l => {
        try {
          const obj = JSON.parse(l);
          if(obj.type === 'Point' && obj.metric === 'http_req_duration'){
            requests.push({
              time: obj.data.time.split('T')[1].split('Z')[0],
              method: obj.data.tags.method,
              url: obj.data.tags.url,
              status: obj.data.tags.status,
              duration: obj.data.value
            });
            totalDuration += obj.data.value;
            durationCount++;
            urlsSet.add(obj.data.tags.url);
          }
          if(obj.type === 'Point' && obj.metric === 'http_reqs' && obj.data.tags.expected_response === 'false'){
            failedRequests++;
          }
        } catch(e){}
      });

      // Summary cards
      document.getElementById('totalRequests').textContent = requests.length;
      document.getElementById('failedRequests').textContent = failedRequests;
      document.getElementById('avgDuration').textContent = (totalDuration/durationCount).toFixed(2);

      // URL filter
      let urlFilter = document.getElementById('urlFilter');
      Array.from(urlsSet).forEach(url => {
        let opt = document.createElement('option');
        opt.value = url;
        opt.textContent = url;
        urlFilter.appendChild(opt);
      });

      // Table
      let tbody = document.querySelector('#requestsTable tbody');
      function populateTable(filter='all'){
        tbody.innerHTML = '';
        requests.filter(r => filter==='all' || r.url===filter).forEach(r => {
          let tr = document.createElement('tr');
          tr.innerHTML = `<td>${r.time}</td>
                          <td>${r.method}</td>
                          <td>${r.url}</td>
                          <td class="${r.status.startsWith('2')?'status-2xx':r.status.startsWith('4')?'status-4xx':'status-5xx'}">${r.status}</td>
                          <td>${r.duration.toFixed(2)}</td>`;
          tbody.appendChild(tr);
        });
      }
      populateTable();
      urlFilter.addEventListener('change', e => populateTable(e.target.value));

      // Chart.js - interactive duration chart
      let ctx1 = document.getElementById('durationChart').getContext('2d');
      let durationChart = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: requests.map(r => r.time),
          datasets: [{
            label: 'Request Duration (ms)',
            data: requests.map(r => r.duration),
            borderColor:'rgba(41,128,185,1)',
            backgroundColor:'rgba(52,152,219,0.3)',
            fill:true,
            tension:0.3
          }]
        },
        options: {
          responsive:true,
          plugins:{
            tooltip:{ mode:'index', intersect:false },
            legend:{ display:true, position:'top', labels:{ usePointStyle:true } }
          },
          interaction:{ mode:'nearest', axis:'x', intersect:false },
          scales:{y:{beginAtZero:true}}
        }
      });

      // Chart.js - interactive errors chart
      let errorCounts = {};
      requests.forEach(r => { if(r.status!=='200') errorCounts[r.url] = (errorCounts[r.url]||0)+1; });
      let ctx2 = document.getElementById('errorsChart').getContext('2d');
      let errorsChart = new Chart(ctx2, {
        type:'bar',
        data:{
          labels: Object.keys(errorCounts),
          datasets:[{
            label:'Failed Requests',
            data:Object.values(errorCounts),
            backgroundColor:Object.values(errorCounts).map(v=>'rgba(231,76,60,'+(0.3+Math.min(v/10,0.7))+')'),
            borderColor:'rgba(192,57,43,1)',
            borderWidth:1
          }]
        },
        options:{
          responsive:true,
          plugins:{
            tooltip:{ enabled:true },
            legend:{ display:true }
          },
          scales:{y:{beginAtZero:true}}
        }
      });
      </script>
      </body>
      </html>
      EOF
