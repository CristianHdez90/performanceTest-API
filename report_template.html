<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>K6 Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* estilos como antes */
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f4f6f8; }
/* resto de estilos... */
</style>
</head>
<body>
<header><h1>K6 Interactive Dashboard</h1></header>
<div class="container">
  <div class="cards">
    <div class="card"><h2>Total Requests</h2><p id="totalRequests">0</p></div>
    <div class="card"><h2>Failed Requests</h2><p id="failedRequests">0</p></div>
    <div class="card"><h2>Average Duration (ms)</h2><p id="avgDuration">0</p></div>
  </div>

  <label for="urlFilter">Filter by URL:</label>
  <select id="urlFilter"><option value="all">All</option></select>

  <h2>Requests Table</h2>
  <table id="requestsTable">
    <thead>
      <tr>
        <th>Time</th>
        <th>Method</th>
        <th>URL</th>
        <th>Status</th>
        <th>Duration (ms)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Charts</h2>
  <canvas id="durationChart" height="100"></canvas>
  <canvas id="errorsChart" height="100"></canvas>
</div>

<script src="data.js"></script>
<script>
// Aquí todo el script de JS que parsea requestsData y genera tablas y charts
</script>
</body>
</html>
