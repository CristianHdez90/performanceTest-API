name: K6 Performance Tests & Observability

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  BASE_URL_API: https://reqres.in/api
  API_KEY: reqres_597960b2f19a45eeb2ec6531b2998eb6
  REPORT_DIR: ./target/site/reportsK6
  P95_THRESHOLD: 500
  ENVIRONMENT: staging

jobs:

  run_k6:
    name: "🧪 Run K6 tests"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Install K6 + jq + bc
        run: |
          sudo apt update
          sudo apt install -y gnupg software-properties-common curl jq bc
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install -y k6

      - name: 📝 Run K6 tests
        run: |
          mkdir -p $REPORT_DIR
          k6 run ./tests/users-test.js --out json=$REPORT_DIR/report.json

      - name: 📤 Upload K6 report artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: ${{ env.REPORT_DIR }}

  update_history:
    name: "📊 Update Performance History"
    runs-on: ubuntu-latest
    needs: run_k6

    steps:
      # 1️ Checkout
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️ Setup Node
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️ Download K6 report artifact
      - name: 📥 Download K6 report artifact
        uses: actions/download-artifact@v4
        with:
          name: k6-report
          path: ${{ env.REPORT_DIR }}

      # 4️ Update history via Node script
      - name: 📊 Update performance history
        run: node scripts/save-history.js

  deploy_report:
    name: "🚀 Deploy K6 Report to GitHub Pages"
    runs-on: ubuntu-latest
    needs: update_history

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

    #   - name: 📥 Download HTML report artifact
    #     uses: actions/download-artifact@v4
    #     with:
    #       name: k6-html-report
    #       path: ${{ env.REPORT_DIR }}

      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.REPORT_DIR }}         

