name: K6 Performance Tests & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  BASE_URL_API: https://reqres.in/api
  API_KEY: reqres_ce4bae3ca38545618d0e2bf0834e717c
  REPORT_DIR: ./target/site/reportsK6

jobs:
  run_k6:
    name: "Run K6 tests"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 📦 Install K6
        run: |
          sudo apt update
          sudo apt install -y gnupg software-properties-common curl
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install -y k6

      - name: 📝 Run K6 tests
        run: |
          mkdir -p ${{ env.REPORT_DIR }}
          k6 run ./tests/users-test.js --out json=${{ env.REPORT_DIR }}/report.json

      - name: 📤 Upload K6 report artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: ${{ env.REPORT_DIR }}

  generate_report:
    name: "📊 Generate HTML Report from K6 JSON"
    runs-on: ubuntu-latest
    needs: run_k6
    steps:
      - name: 📥 Download K6 report artifact
        uses: actions/download-artifact@v4
        with:
          name: k6-report
          path: ${{ env.REPORT_DIR }}

      - name: 🧮 Generate HTML from JSON
        run: |
          mkdir -p ${{ env.REPORT_DIR }}
          TMP_JSON="${{ env.REPORT_DIR }}/report_temp.json"
          cp "${{ env.REPORT_DIR }}/report.json" "$TMP_JSON"

          echo "<!DOCTYPE html><html><head><title>K6 Performance Report</title></head><body>" > "${{ env.REPORT_DIR }}/index.html"
          echo "<h1>K6 Performance Report</h1>" >> "${{ env.REPORT_DIR }}/index.html"
          echo "<pre>" >> "${{ env.REPORT_DIR }}/index.html"
          cat "$TMP_JSON" >> "${{ env.REPORT_DIR }}/index.html"
          echo "</pre></body></html>" >> "${{ env.REPORT_DIR }}/index.html"

      - name: 📤 Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-html-report
          path: ${{ env.REPORT_DIR }}

  deploy_report:
    name: "🚀 Deploy K6 Report to GitHub Pages"
    runs-on: ubuntu-latest
    needs: generate_report
    steps:
      - name: 📥 Download HTML report artifact
        uses: actions/download-artifact@v4
        with:
          name: k6-html-report
          path: ${{ env.REPORT_DIR }}

      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.REPORT_DIR }}


